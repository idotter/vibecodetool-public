<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger - Frosch-Abenteuer</title>
    

<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            text-align: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            flex: 1;
            min-width: 100px;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            font-weight: bold;
        }

        .info-value {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #90EE90 30%, #D3D3D3 30%, #D3D3D3 70%, #87CEEB 70%);
            border: 4px solid #333;
            border-radius: 10px;
            margin: 20px auto;
            cursor: none;
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        .controls {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 0.95em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }

        .message {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin: 15px 0;
            min-height: 30px;
        }

        .message.success {
            color: #27ae60;
        }

        .message.gameover {
            color: #e74c3c;
        }

        .stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .high-score {
            color: #667eea;
            font-size: 1.1em;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }

            .container {
                padding: 20px;
            }

            #gameCanvas {
                max-width: 100%;
            }
        }
    </style>


</head>
<body>

    <div class="container">
        <h1>🐸 Frogger 🐸</h1>
        
        <div class="info">
            <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value" id="levelDisplay">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">Punkte</div>
                <div class="info-value" id="scoreDisplay">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Leben</div>
                <div class="info-value" id="livesDisplay">3</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="600"></canvas>

        <div class="message" id="message"></div>

        <div class="controls">
            <p>⬅️ ➡️ ⬆️ ⬇️ oder WASD zum Bewegen</p>
            <p>Hilf dem Frosch, sicher über die Straße zu kommen!</p>
        </div>

        <div class="button-group">
            <button class="btn-start" id="startBtn" onclick="startGame()">Start</button>
            <button class="btn-reset" id="resetBtn" onclick="resetGame()">Zurücksetzen</button>
        </div>

        <div class="stats">
            <div class="high-score">Bester Score: <span id="bestScore">0</span></div>
        </div>
    </div>

    

<script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let lives = 3;
        let bestScore = 0;

        // Frog
        const frog = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            width: 30,
            height: 30,
            speed: 40,
            originalX: canvas.width / 2 - 15,
            originalY: canvas.height - 50
        };

        // Cars
        let cars = [];
        let logs = [];

        // Keys pressed
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if(['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) moveFrog('right');
                else if (deltaX < -50) moveFrog('left');
            } else {
                if (deltaY > 50) moveFrog('down');
                else if (deltaY < -50) moveFrog('up');
            }
        });

        function moveFrog(direction) {
            if (!gameRunning) return;
            
            if (direction === 'up' && frog.y - frog.speed >= 40) frog.y -= frog.speed;
            else if (direction === 'down' && frog.y + frog.speed <= canvas.height - 50) frog.y += frog.speed;
            else if (direction === 'left' && frog.x - frog.speed >= 0) frog.x -= frog.speed;
            else if (direction === 'right' && frog.x + frog.speed <= canvas.width - frog.width) frog.x += frog.speed;
            
            checkWaterCollision();
        }

        function handleInput() {
            if (keys['arrowup'] || keys['w']) moveFrog('up');
            if (keys['arrowdown'] || keys['s']) moveFrog('down');
            if (keys['arrowleft'] || keys['a']) moveFrog('left');
            if (keys['arrowright'] || keys['d']) moveFrog('right');
        }

        function createLevel() {
            cars = [];
            logs = [];

            const rowCount = 6;
            const baseSpeed = 2 + (level - 1) * 0.5;

            // Create car lanes (road)
            for (let i = 0; i < rowCount; i++) {
                const y = 200 + i * 50;
                const numCars = 2 + Math.floor(level / 2);
                const direction = i % 2 === 0 ? 1 : -1;
                const speed = baseSpeed * (1 + (i % 3) * 0.3) * direction;

                for (let j = 0; j < numCars; j++) {
                    cars.push({
                        x: (j * (canvas.width / numCars)) + 50,
                        y: y,
                        width: 60,
                        height: 35,
                        speed: speed,
                        color: ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3'][i % 4]
                    });
                }
            }

            // Create log lanes (water)
            for (let i = 0; i < 3; i++) {
                const y = 50 + i * 50;
                const direction = i % 2 === 0 ? 1 : -1;
                const speed = 1.5 * direction;

                for (let j = 0; j < 3; j++) {
                    logs.push({
                        x: j * 200 + 30,
                        y: y,
                        width: 80,
                        height: 35,
                        speed: speed,
                        color: '#8B4513'
                    });
                }
            }
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            level = 1;
            lives = 3;
            frog.x = frog.originalX;
            frog.y = frog.originalY;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            createLevel();
            gameLoop();
        }

        function resetGame() {
            gameRunning = false;
            score = 0;
            level = 1;
            lives = 3;
            frog.x = frog.originalX;
            frog.y = frog.originalY;
            document.getElementById('message').textContent = '';
            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('livesDisplay').textContent = lives;
            document.getElementById('bestScore').textContent = bestScore;
        }

        function drawFrog() {
            ctx.fillStyle = '#52B788';
            ctx.fillRect(frog.x, frog.y, frog.width, frog.height);
            ctx.fillStyle = '#2D6A4F';
            ctx.fillRect(frog.x + 5, frog.y + 5, 8, 8);
            ctx.fillRect(frog.x + frog.width - 13, frog.y + 5, 8, 8);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(frog.x + frog.width / 2, frog.y + frog.height / 2, 12, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCars() {
            cars.forEach(car => {
                ctx.fillStyle = car.color;
                ctx.fillRect(car.x, car.y, car.width, car.height);
                ctx.fillStyle = '#000';
                ctx.fillRect(car.x + 10, car.y + 5, 8, 8);
                ctx.fillRect(car.x + car.width - 18, car.y + 5, 8, 8);
            });
        }

        function drawLogs() {
            logs.forEach(log => {
                ctx.fillStyle = log.color;
                ctx.fillRect(log.x, log.y, log.width, log.height);
                ctx.fillStyle = '#654321';
                ctx.fillRect(log.x + 10, log.y + 10, 8, 8);
                ctx.fillRect(log.x + log.width - 18, log.y + 10, 8, 8);
            });
        }

        function updateCars() {
            cars.forEach(car => {
                car.x += car.speed;
                if (car.speed > 0 && car.x > canvas.width) car.x = -car.width;
                if (car.speed < 0 && car.x < -car.width) car.x = canvas.width;
            });
        }

        function updateLogs() {
            logs.forEach(log => {
                log.x += log.speed;
                if (log.speed > 0 && log.x > canvas.width) log.x = -log.width;
                if (log.speed < 0 && log.x < -log.width) log.x = canvas.width;
            });
        }

        function checkCollisions() {
            // Check car collisions
            for (let car of cars) {
                if (frog.x < car.x + car.width &&
                    frog.x + frog.width > car.x &&
                    frog.y < car.y + car.height &&
                    frog.y + frog.height > car.y) {
                    hitByCar();
                    return;
                }
            }
        }

        function checkWaterCollision() {
            // Check if frog is in water
            if (frog.y >= 40 && frog.y < 200) {
                let onLog = false;
                for (let log of logs) {
                    if (frog.x < log.x + log.width &&
                        frog.x + frog.width > log.x &&

<body>
    <div class="container">
        <h1>⏱️ 5-Minuten Timer</h1>
        
        <div class="timer-display" id="timerDisplay">05:00</div>
        
        <div class="button-group">
            <button class="start-btn" id="startBtn" onclick="startTimer()">▶ Start</button>
            <button class="pause-btn" id="pauseBtn" onclick="pauseTimer()" disabled>⏸ Pause</button>
            <button class="reset-btn" onclick="resetTimer()">🔄 Zurücksetzen</button>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const TOTAL_TIME = 5 * 60; // 5 minutes in seconds
        let timeLeft = TOTAL_TIME;
        let isRunning = false;
        let intervalId = null;

        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const progressBar = document.getElementById('progressBar');
        const statusDiv = document.getElementById('status');

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
            
            const progressPercent = ((TOTAL_TIME - timeLeft) / TOTAL_TIME) * 100;
            progressBar.style.width = progressPercent + '%';

            if (timeLeft === 0) {
                timerDisplay.classList.add('finished');
                statusDiv.textContent = '🎉 Zeit abgelaufen!';
                statusDiv.classList.add('finished-msg');
                playSound();
            } else {
                timerDisplay.classList.remove('finished');
                statusDiv.classList.remove('finished-msg');
                statusDiv.textContent = isRunning ? '⏳ Timer läuft...' : '';
            }
        }

        function startTimer() {
            if (isRunning || timeLeft === 0) return;
            
            isRunning = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            timerDisplay.classList.add('running');

            intervalId = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft === 0) {
                    clearInterval(intervalId);
                    isRunning = false;
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    timerDisplay.classList.remove('running');
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            clearInterval(intervalId);
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            timerDisplay.classList.remove('running');
            statusDiv.textContent = '⏸ Pausiert';
        }

        function resetTimer() {
            clearInterval(intervalId);
            timeLeft = TOTAL_TIME;
            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            timerDisplay.classList.remove('running', 'finished');
            statusDiv.textContent = '';
            statusDiv.classList.remove('finished-msg');
            updateDisplay();
        }

        function playSound() {
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
